    const jd = new Date(j), jy = jd.getFullYear();
    if (jy > CY)

        const d = Math.round((FYE - jd) / 86400000) + 1;

/* ─────────────────────────  CSS  ───────────────────────── */
const css = `
*{box-sizing:border-box;}
html{overflow-x:hidden;max-width:100vw;}
body{overflow-x:hidden;max-width:100vw;}
:root{
  --bg:#f4f7fb; --card:#ffffff; --ink:#1a2233; --muted:#8a929e; --line:#eef1f6;
  --lilac:#1d6ff2; --lilac-t:#eaf2fe;
  --navy:#1a2233; --navy-soft:#475467;
  --accent:#1d6ff2; --accent-2:#1560da;
  --rail:#ffffff;
}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#eef4fd 0%,#f4f7fb 60%);}
.auth-card{width:100%;max-width:380px;background:#fff;border:1px solid #eef1f6;border-radius:20px;padding:34px 28px;box-shadow:0 12px 40px rgba(29,111,242,.10),0 2px 8px rgba(26,34,51,.04);}
.auth-brand{text-align:center;margin-bottom:22px;}
.auth-title{font-family:'Space Grotesk','Pretendard Variable',sans-serif;font-size:26px;font-weight:700;margin-top:10px;letter-spacing:-.01em;color:var(--ink);}
.auth-sub{font-size:13px;color:var(--muted);margin-top:6px;}
.lock-badge{width:56px;height:56px;border-radius:16px;background:#1d6ff2;color:#fff;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 22px rgba(29,111,242,.35);}
.field{display:flex;flex-direction:column;margin-bottom:14px;}
.flabel{font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;}
.hint{font-size:11px;color:var(--muted);margin-top:4px;}
input:not([type=checkbox]):not([type=radio]):not(.docf-inp),select:not(.docf-inp){font-family:inherit;font-size:14px;padding:11px 14px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);width:100%;transition:border-color .15s,box-shadow .15s;}
input:focus,select:focus{outline:none;border-color:#1d6ff2;box-shadow:0 0 0 4px rgba(29,111,242,.12);}
input:disabled{background:#f5f6fa;color:#9aa0b0;}
.btn{font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;}
.btn:hover{background:#f7f8fa;border-color:#dfe3ea;}
.btn-primary{background:#1d6ff2;border-color:#1d6ff2;color:#fff;box-shadow:0 6px 16px rgba(29,111,242,.28);}
.btn-primary:hover{background:#1560da;border-color:#1560da;box-shadow:0 8px 22px rgba(29,111,242,.36);}
.btn-ghost{background:#fff;}
.btn-block{width:100%;}
.btn-sm{padding:8px 13px;font-size:13px;border-radius:10px;}
.btn-xs{padding:6px 11px;font-size:12px;border-radius:10px;}
.btn-line{background:#eaf2fe;color:#1d6ff2;border:1px solid #dbe9fd;}
.btn-line:hover{background:#dcebfd;background:#ddebfd;border-color:#c8ddfb;}
.btn-approve{background:#eaf2fe;color:#1d6ff2;border-color:#dbe9fd;}
.btn-approve:hover{background:#dbe9fd;}
.btn-reject{background:#eef0f3;color:#5a6675;border-color:#e1e5ea;}
.btn-reject:hover{background:#e6e9ee;}
.err-text{color:#b0556f;font-size:12.5px;margin:2px 0 0;}
.ok-text{color:#1d6ff2;font-size:12.5px;margin:2px 0 0;}
.sample-block{margin-top:20px;border-top:1px solid var(--line);padding-top:16px;}
.sample-h{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;}
.sample-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:7px 12px;background:#f7f8fc;border-radius:10px;margin-bottom:6px;}

/* layout — light bright + left icon rail + glass cards */
.layout{display:flex;min-height:100vh;background:#f4f7fb;position:relative;isolation:isolate;}

/* LEFT ICON RAIL — light minimal */
.rail{width:68px;flex-shrink:0;background:#fff;border-right:1px solid #eef1f6;display:flex;flex-direction:column;align-items:center;padding:18px 0;position:fixed;left:0;top:0;height:100vh;z-index:90;gap:6px;}
.rail-logo{display:inline-flex;align-items:baseline;justify-content:center;gap:1px;margin-bottom:20px;flex-shrink:0;padding:8px 4px;background:transparent;}
.logo-txt{font-family:'Space Grotesk','Pretendard Variable',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.02em;color:#1d6ff2;white-space:nowrap;}
.logo-cur{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:#1d6ff2;animation:blink 1.1s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}
.rail-nav{display:flex;flex-direction:column;gap:4px;flex:1;align-items:center;}
.rail-bottom{margin-top:auto;}
.rail-item{position:relative;width:44px;height:44px;border-radius:13px;border:none;background:transparent;color:#9aa1ad;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .16s;}
.rail-item:hover{background:#eaf2fe;color:#1d6ff2;}
.rail-item.active{background:#1d6ff2;color:#fff;box-shadow:0 6px 16px rgba(29,111,242,.4);}
.rail-dot{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:#f04438;border:1.5px solid #fff;}
.rail-item.active .rail-dot{background:#fff;border-color:#1d6ff2;}
.rail-tip{position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:#1a2233;color:#fff;font-size:12px;font-weight:500;padding:6px 11px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:120;box-shadow:0 6px 20px rgba(0,0,0,.25);}
.rail-item:hover .rail-tip{opacity:1;}

.main{flex:1;min-width:0;max-width:100%;display:flex;flex-direction:column;overflow-x:hidden;background:#f4f7fb;margin-left:68px;}
.topbar{padding:0;background:rgba(244,247,251,0.85);position:sticky;top:0;z-index:80;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.topbar-row{display:flex;align-items:center;gap:14px;height:clamp(64px,6vw,74px);padding:0 clamp(18px,3vw,36px);background:transparent;}
.topbar-brand{display:none;align-items:center;gap:8px;font-size:17px;font-weight:800;letter-spacing:-.02em;color:#15181d;}

/* top search */
.top-search-wrap{position:relative;}
.top-search{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:13px;padding:0 14px;height:42px;width:min(340px,32vw);color:var(--muted);transition:all .15s;}
.top-search-clear{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;display:inline-flex;padding:2px;border-radius:6px;}
.top-search-clear:hover{background:#eef0f3;color:#3a4250;}
.search-backdrop{position:fixed;inset:0;z-index:200;}
.search-dropdown{position:absolute;top:48px;left:0;width:min(360px,80vw);max-height:420px;overflow-y:auto;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 12px 32px rgba(21,24,29,.14);z-index:201;padding:8px;}
.search-empty{padding:18px;text-align:center;font-size:13px;color:var(--muted);}
.search-group{margin-bottom:4px;}
.search-group-label{font-size:10.5px;font-weight:700;color:#9aa1ad;padding:6px 10px 4px;letter-spacing:.03em;}
.search-item{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:13.5px;color:#2a3340;text-align:left;transition:background .12s;font-family:inherit;}
.search-item:hover{background:#f5f6f8;}
.search-item-ic{width:30px;height:30px;border-radius:9px;background:#eef0f3;color:#3a4250;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.search-item-av{width:30px;height:30px;border-radius:50%;background:#15181d;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.top-search:focus-within{border-color:var(--ink);box-shadow:0 0 0 4px rgba(26,31,38,.06);background:#fff;}
.top-search input{border:none;background:transparent;outline:none;font-family:inherit;font-size:14px;color:var(--ink);width:100%;padding:0;}
.top-search input::placeholder{color:var(--muted);}
.topbar-spacer{flex:1;}

.top-actions{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.top-profile{display:flex;align-items:center;gap:10px;border:none;background:transparent;padding:4px 6px 4px 4px;cursor:pointer;border-radius:14px;transition:background .14s;}
.top-profile:hover{background:rgba(255,255,255,.6);}
.tp-avatar{width:42px;height:42px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(26,31,38,.14);}
.tp-icon{background:#1d6ff2;color:#fff;}
.tp-meta{display:flex;flex-direction:column;align-items:flex-start;line-height:1.3;}
.tp-name{font-size:14px;font-weight:700;color:#1a1f26;white-space:nowrap;}
.tp-role{font-size:12px;color:var(--muted);}
.tp-chev{display:inline-flex;color:var(--muted);transform:rotate(90deg);margin-left:2px;}
.round-btn{position:relative;width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:#1a1f26;transition:all .14s;}
.round-btn:hover{background:#fff;}
.bell-cnt{position:absolute;top:-2px;right:-2px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#f04438;color:#fff;font-size:10.5px;font-weight:700;line-height:1;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(240,68,56,.35);border:2.5px solid #f4f7fb;}
.hamburger{display:none;width:42px;height:42px;border-radius:13px;border:none;background:rgba(255,255,255,.65);align-items:center;justify-content:center;cursor:pointer;color:var(--ink);flex-shrink:0;}

/* page head (welcome) */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:clamp(18px,2vw,26px);flex-wrap:wrap;}
.page-title{font-size:clamp(24px,3vw,36px);font-weight:800;letter-spacing:-.04em;color:#15181d;line-height:1.15;}
.page-title.greet-title{font-weight:500;color:#4a525e;}
.page-title.greet-title strong{font-weight:800;color:#15181d;}
.page-sub{font-size:clamp(13px,1.2vw,15px);color:var(--muted);margin-top:6px;}
.greet-editable{display:inline-flex;align-items:center;gap:6px;cursor:pointer;border-radius:8px;padding:2px 6px;margin-left:-6px;transition:background .14s;}
.greet-editable:hover{background:rgba(26,31,38,.05);}
.greet-pen{opacity:0;display:inline-flex;color:var(--muted);transition:opacity .14s;}
.greet-editable:hover .greet-pen{opacity:1;}
.greet-inline-edit{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap;}
.greet-inline-edit input{font-family:inherit;font-size:clamp(13px,1.2vw,15px);padding:6px 12px;border-radius:10px;border:1px solid var(--ink);background:#fff;color:var(--ink);width:min(360px,70vw);box-shadow:0 0 0 4px rgba(26,31,38,.06);}
.greet-inline-edit input:focus{outline:none;}
.greet-save,.greet-cancel{width:34px;height:34px;border-radius:10px;border:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .14s;flex-shrink:0;}
.greet-save{background:#15181d;color:#fff;}
.greet-save:hover{background:#2a2f37;}
.greet-cancel{background:#f0f1f4;color:var(--muted);}
.greet-cancel:hover{background:#e6e8ec;color:var(--ink);}
.greet-hint{font-size:11.5px;color:var(--muted);}

/* mobile drawer */
.rail-backdrop{display:none;position:fixed;inset:0;background:rgba(16,20,26,.45);z-index:199;}
.rail-drawer{display:none;}
.mobile-only{display:none !important;}
.sidebar-backdrop{display:none;}
.crumb,.back-btn,.page-title-row,.topnav{display:none;}
.content{padding:clamp(18px,2vw,30px) clamp(18px,3vw,40px) clamp(32px,3vw,52px);background:#f4f7fb;flex:1;}

.notif-pop{margin:0 28px 16px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 16px 44px rgba(16,24,40,.10);padding:14px 16px;}
.notif-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.notif-title{font-size:15px;font-weight:600;}
.icon-x{width:28px;height:28px;border-radius:10px;border:1px solid var(--line);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);}
.icon-x:hover{background:#f7f8fc;}
.notif-item{display:flex;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line);align-items:flex-start;}
.notif-item:last-child{border-bottom:none;}
.notif-ic{width:32px;height:32px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.notif-text{font-size:13.5px;}
.notif-time{font-size:11px;color:var(--muted);margin-top:2px;}

/* cards */
.card{background:#fff;border:1px solid #eef1f6;border-radius:clamp(16px,1.8vw,22px);padding:clamp(18px,2vw,26px) clamp(18px,2.2vw,28px);box-shadow:0 1px 3px rgba(26,34,51,.04),0 8px 24px rgba(29,111,242,.05);}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.head-back{display:flex;align-items:center;gap:11px;min-width:0;}
.back-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .14s;box-shadow:0 1px 3px rgba(26,34,51,.05);}
.back-btn:hover{background:var(--lilac-t);border-color:var(--accent);color:var(--accent);}
.back-btn:active{transform:translateX(-1px);}
.card-head h3{font-size:clamp(15px,1.3vw,17px);font-weight:700;letter-spacing:-.02em;}
.card-sub{font-size:12px;color:var(--muted);}
.lead{font-size:13px;color:var(--muted);margin:-6px 0 16px;}

/* hero stat cards */
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(9px,1.1vw,14px);margin-bottom:clamp(12px,1.4vw,18px);}
.stat-card{background:#fff;border:1px solid #eef1f6;border-radius:clamp(12px,1.2vw,16px);padding:clamp(12px,1.2vw,18px);display:flex;align-items:center;gap:clamp(10px,1.1vw,14px);box-shadow:0 1px 3px rgba(26,34,51,.04);transition:all .18s;}
.stat-ic{width:clamp(34px,2.8vw,44px);height:clamp(34px,2.8vw,44px);border-radius:clamp(9px,1vw,13px);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;background:#eef0f3;color:#3a4250;}
.leave-hero-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:stretch;}
.leave-main{padding:16px 18px;border-radius:14px;background:#f7f8fa;border:1px solid var(--line);}
.leave-subs{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.leave-sub{display:flex;align-items:center;gap:10px;padding:14px;border-radius:14px;background:#f7f8fa;border:1px solid var(--line);}
.leave-sub-ic{width:32px;height:32px;border-radius:9px;background:#eef0f3;color:#5a6675;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
@media(max-width:720px){.leave-hero-grid{grid-template-columns:1fr;}}
.stat-label{font-size:clamp(10.5px,1vw,13px);color:var(--muted);margin-bottom:2px;}
.stat-value{font-size:clamp(16px,1.8vw,24px);font-weight:700;letter-spacing:-.03em;color:var(--ink);}
.stat-meta{min-width:0;flex:1;}

.dash-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;}
.dash-cal-grid{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;align-items:stretch;}
.dash-cal-side{display:flex;flex-direction:column;gap:14px;min-width:0;}
.dash-cal-side .dash-recent{flex:1;display:flex;flex-direction:column;}
.dash-cal-side .dash-recent .feed{flex:1;}
@media(max-width:1000px){.dash-cal-grid{grid-template-columns:1fr;}.dash-cal-side .dash-recent{flex:initial;}}
.workload-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:16px;}
.resp-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}

.emp-status-list{display:flex;flex-direction:column;gap:4px;}
.esl-row{display:flex;align-items:center;gap:13px;padding:11px 6px;border-bottom:1px solid var(--line);}
.esl-row:last-child{border-bottom:none;}
.esl-info{flex:1;min-width:0;}
.esl-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.esl-name{font-weight:600;font-size:14px;}
.esl-dept{font-size:12px;color:var(--muted);}
.bar-track{height:6px;border-radius:10px;background:#eef0f6;overflow:hidden;}
.bar-fill{height:100%;border-radius:10px;transition:width .4s;}
.esl-nums{text-align:right;flex-shrink:0;display:flex;flex-direction:column;gap:3px;}
.esl-pair{display:flex;align-items:center;justify-content:flex-end;gap:8px;}
.ep-k{font-size:11px;font-weight:600;}
.ep-v{font-size:13px;font-weight:700;min-width:54px;text-align:right;}
.feed{display:flex;flex-direction:column;gap:2px;}
.feed-row{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line);}
.feed-row:last-child{border-bottom:none;}
.feed-ic{width:34px;height:34px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.feed-name{font-size:13.5px;font-weight:500;}
.feed-meta{font-size:11.5px;color:var(--muted);margin-top:1px;}

/* pills / badges */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:10px;font-size:11.5px;font-weight:600;}
.pill-neutral{background:#eef0f6;color:#6a7080;}
.stat{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 11px;border-radius:10px;}
.dot{width:6px;height:6px;border-radius:10px;display:inline-block;flex-shrink:0;}

/* tables */
.tscroll{overflow-x:auto;margin:0 -4px;}
table.dt{width:100%;border-collapse:collapse;}
.dt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%;border-radius:inherit;}
.dt-wrap table.dt{min-width:480px;}
.dt th{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em;padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap;}
.dt td{padding:13px 12px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;}
.dt tr:last-child td{border-bottom:none;}
.dt tbody tr:hover{background:rgba(255,255,255,.6);}
.muted{color:var(--muted);}
.cell-user{display:flex;align-items:center;gap:10px;}
.cu-name{font-weight:600;display:flex;align-items:center;gap:6px;}
.pending-txt{font-size:11.5px;font-weight:500;color:var(--muted);}
.pending-txt::before{content:"· ";}
.cu-sub{font-size:11.5px;color:var(--muted);margin-top:1px;}
.row-actions{display:flex;gap:6px;justify-content:flex-end;}
.ic-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:#6a7080;transition:all .14s;box-shadow:0 2px 8px rgba(50,48,60,.05);}
.ic-btn:hover{background:#f4f5fb;color:var(--ink);border-color:#e0e3ee;}
.ic-danger{color:#8a929e;}
.ic-danger:hover{background:#f0f1f4;color:#5a6675;border-color:#e1e5ea;}
.empty-cell{text-align:center;color:var(--muted);padding:34px;font-size:13.5px;}
.empty-mini{color:var(--muted);text-align:center;padding:22px;font-size:13px;}

/* forms */
.inline-form{background:#ffffff;border:1px solid var(--line);box-shadow:0 2px 8px rgba(50,48,60,.04);border-radius:10px;padding:18px;margin-bottom:16px;}
.if-title{font-size:13.5px;font-weight:600;margin-bottom:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.gf-grid{display:grid;grid-template-columns:1.3fr 1fr .8fr 1.4fr auto;gap:10px;align-items:end;}
.mini-select{width:auto;padding:8px 11px;font-size:13px;}
.form-stack{display:flex;flex-direction:column;gap:13px;}
.info-banner{background:#eef0f3;color:#5a6675;border-radius:10px;padding:10px 13px;font-size:12.5px;}
.seg{display:flex;gap:8px;}
.seg-opt{flex:1;text-align:center;padding:10px;border-radius:10px;border:1px solid #e4e6ef;background:#fff;cursor:pointer;font-size:13.5px;font-weight:500;transition:all .14s;}
.seg-opt.on{background:var(--lilac-t);border-color:var(--lilac);color:var(--lilac);font-weight:600;}
.usage-line{font-size:12.5px;color:var(--muted);}

/* messages */
.msg-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;}
.ocr-icon-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;border:1.5px dashed var(--line);background:rgba(255,255,255,.7);color:#5a6473;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all .14s;}
.ocr-icon-btn:hover{border-color:#3a4250;color:#3a4250;background:#fff;}
.ocr-box{background:rgba(255,255,255,.6);border:1.5px dashed var(--line);border-radius:14px;padding:14px;text-align:center;}
.ocr-btn{display:inline-flex;align-items:center;gap:8px;background:#1e2530;color:#fff;border:none;border-radius:11px;padding:10px 18px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;}
.ocr-btn:hover{background:#2a3340;}
.ocr-preview{display:flex;flex-direction:column;align-items:center;gap:8px;}
.ocr-loading{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.ocr-spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:#1e2530;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.msg-panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px 24px;box-shadow:0 1px 2px rgba(26,34,51,.03),0 4px 16px rgba(26,34,51,.03);}
.msg-list-panel{padding:8px;}
.msg-panel-head{margin-bottom:8px;}
.msg-panel-head h3{font-size:20px;font-weight:700;letter-spacing:-.02em;}
.msg-panel-sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
.msg-le{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;cursor:pointer;transition:background .14s;}
.msg-le:hover{background:rgba(255,255,255,.6);}
.msg-le.active{background:#fff;box-shadow:0 4px 14px rgba(91,141,239,.08);}
.mle-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.mle-name{font-weight:600;font-size:13.5px;}
.mle-badge{background:var(--lilac);color:#fff;font-size:11px;font-weight:600;min-width:18px;height:18px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;}
.mle-last{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.mt-head{display:flex;align-items:center;gap:11px;padding-bottom:14px;border-bottom:1px solid var(--line);margin-bottom:6px;}
.thread{min-height:300px;max-height:440px;overflow-y:auto;padding:14px 2px;display:flex;flex-direction:column;}
.bubble-row{display:flex;justify-content:flex-start;margin-bottom:14px;max-width:100%;}
.bubble-row.me{justify-content:flex-end;}
.bubble-row > div{max-width:78%;min-width:0;}
.bubble{display:inline-block;padding:11px 15px;border-radius:16px;font-size:13.5px;line-height:1.45;word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap;}
.bme{background:var(--lilac);color:#fff;border-bottom-right-radius:5px;box-shadow:0 4px 12px rgba(91,141,239,.18);}
.bthem{background:rgba(255,255,255,.6);color:var(--ink);border-bottom-left-radius:5px;}
.mtime{font-size:10.5px;color:var(--muted);margin-top:4px;}
.bubble-row.me .mtime{text-align:right;}
.msg-input{display:flex;gap:8px;margin-top:14px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:7px;box-shadow:0 1px 2px rgba(26,34,51,.03);}
.msg-input input{border:none;background:transparent;box-shadow:none;padding:6px;flex:1;}
.msg-input input:focus{box-shadow:none;}
.msg-ic-btn{flex-shrink:0;width:42px;height:42px;border-radius:11px;background:rgba(255,255,255,.6);color:#6a7080;border:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .14s;}
.msg-ic-btn:hover{background:#e9ebf0;}
.msg-send{flex-shrink:0;width:42px;height:42px;border-radius:11px;background:var(--lilac);color:#fff;border:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(91,141,239,.22);transition:all .14s;}
.msg-send:hover{background:#4a7ce0;}

/* profile */
.info-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
.info-single{max-width:560px;}

/* calendar */
.cal-nav{display:flex;align-items:center;gap:8px;}
.cal-month{font-size:13.5px;font-weight:600;min-width:84px;text-align:center;}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-dow{text-align:center;font-size:10.5px;font-weight:600;color:var(--muted);padding:3px 0;}
.cal-dow.sun{color:#b0556f;}
.cal-dow.sat{color:#5a7099;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{height:68px;border:1px solid var(--line);border-radius:9px;padding:5px;display:flex;flex-direction:column;gap:3px;background:#fff;overflow:hidden;}
.cal-cell.empty{border:none;background:transparent;}
.cal-grid.week{grid-template-rows:auto;}
.cal-grid.week .cal-cell{height:140px;}
.cal-cell.big{height:auto;min-height:120px;}
.cal-day-view .cal-cell.big{min-height:180px;}
.cal-day-view{padding-top:4px;}
.cal-list{display:flex;flex-direction:column;gap:2px;max-height:420px;overflow-y:auto;}
.cal-list-row{display:flex;align-items:center;gap:12px;padding:9px 4px;border-bottom:1px solid var(--line);}
.cal-list-row:last-child{border-bottom:none;}
.cll-date{font-size:12.5px;color:var(--muted);font-weight:600;min-width:96px;}
.color-picker{display:flex;gap:7px;align-items:center;}
.color-dot{width:26px;height:26px;border-radius:10px;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;padding:0;transition:transform .12s;}
.color-dot:hover{transform:scale(1.12);}
.color-dot.sel{box-shadow:0 0 0 2px var(--ink);}
.appr-line-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#ffffff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:#475467;}
.appr-line-bar.skip{color:var(--lilac);background:var(--lilac-t);border-color:transparent;}
.alb-label{font-size:11px;font-weight:700;color:var(--muted);}
.alb-group{display:inline-flex;align-items:center;gap:6px;font-weight:500;}
.name-link{background:none;border:none;padding:0;font-family:inherit;font-size:inherit;font-weight:600;color:var(--ink);cursor:pointer;border-bottom:1px dashed transparent;transition:color .14s,border-color .14s;}
.name-link:hover{color:var(--lilac);border-bottom-color:var(--lilac);}
.modal-lg{max-width:680px;width:100%;max-height:88vh;overflow-y:auto;}
.detail-section{margin-bottom:16px;}
.detail-section:last-child{margin-bottom:0;}
.detail-title{font-size:13.5px;font-weight:600;margin-bottom:8px;color:var(--ink);}

/* 공지 슬림 */
.notice-slim{margin-bottom:12px;}
.notice-slim-inner{display:flex;align-items:center;gap:13px;padding:14px 16px;background:#fff;border:1px solid var(--line);border-radius:14px;}
.notice-ic-chip{flex-shrink:0;width:38px;height:38px;border-radius:11px;background:#eaf2fe;color:var(--accent);display:inline-flex;align-items:center;justify-content:center;}
.notice-slim-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.notice-slim-empty{font-size:13px;color:var(--muted);}
.notice-slim-list{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0;}
.notice-slim-item{display:flex;align-items:center;gap:8px;padding:2px 0;cursor:pointer;min-width:0;}
.notice-slim-item:hover .notice-slim-title{color:var(--accent);}
.notice-slim-title{font-size:13.5px;font-weight:600;color:#2a3340;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .12s;flex:1;min-width:0;}
.notice-slim-date{font-size:11px;color:#a8aebb;flex-shrink:0;white-space:nowrap;font-variant-numeric:tabular-nums;}
.notice-pin{flex-shrink:0;font-size:10px;font-weight:700;color:var(--accent);background:#eaf2fe;padding:2px 7px;border-radius:6px;letter-spacing:.02em;}
.notice-slim-body{margin-top:8px;padding:14px 16px;background:#f7f8fa;border:1px solid var(--line);border-radius:12px;font-size:13px;line-height:1.65;color:#3a4050;}

/* 공지 (구형 — 관리자 대시보드) */
.notice-item{padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.notice-item:last-child{border-bottom:none;}
.notice-main{display:flex;align-items:center;gap:9px;}
.notice-title{font-size:13.5px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.notice-date{font-size:11.5px;color:var(--muted);flex-shrink:0;}
.notice-body{margin-top:8px;padding:12px 14px;background:rgba(255,255,255,.6);border-radius:10px;font-size:13px;line-height:1.6;white-space:pre-wrap;color:#3a4050;}
.notice-actions{display:flex;gap:6px;margin-top:10px;}
.chk-line{display:flex;align-items:center;gap:7px;font-size:13px;color:#475467;margin-bottom:12px;cursor:pointer;}
.chk-line input{width:auto;}

/* 결재선 설정 */
.appr-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.appr-label{font-size:12.5px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.role-tag{font-size:11px;font-weight:700;border-radius:10px;padding:2px 8px;}
.appr-chips{display:flex;flex-wrap:wrap;gap:7px;}
.appr-search{position:relative;}
.appr-search input{width:100%;}
.appr-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:20;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 8px 28px rgba(16,24,40,.14);overflow:hidden;}
.appr-opt{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 13px;border:none;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);text-align:left;border-bottom:1px solid var(--line);}
.appr-opt:last-child{border-bottom:none;}
.appr-opt:hover{background:#f7f8fc;}
.appr-opt-sub{font-size:11px;font-weight:500;color:var(--muted);}
.appr-selected{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;min-height:24px;}
.appr-empty{font-size:12px;color:var(--muted);}
.appr-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 6px 5px 11px;border-radius:10px;font-size:12.5px;font-weight:600;}
.appr-tag.lilac{background:var(--lilac-t);color:var(--lilac);}
.appr-tag.blue{background:#E7F0FE;color:#2D6BD6;}
.appr-tag button{display:inline-flex;align-items:center;justify-content:center;border:none;background:rgba(0,0,0,.06);border-radius:10px;width:18px;height:18px;cursor:pointer;color:inherit;padding:0;}
.appr-tag button:hover{background:rgba(0,0,0,.12);}
.appr-chip{display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px;padding:8px 13px;border-radius:10px;border:1px solid #e4e6ef;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#475467;transition:all .14s;}
.appr-chip:hover{background:#f7f8fc;}
.appr-chip .appr-dept{font-size:10.5px;font-weight:500;color:var(--muted);}
.appr-chip.on.lilac{background:var(--lilac-t);border-color:var(--lilac);color:var(--lilac);}
.appr-chip.on.lilac .appr-dept{color:var(--lilac);}
.appr-chip.on.blue{background:#E7F0FE;border-color:#5a7099;color:#2D6BD6;}
.appr-chip.on.blue .appr-dept{color:#2D6BD6;}

/* 의견 */
.cmt-row td{background:#fafbfe;padding:0 12px 12px !important;}
.cmt-box{display:flex;flex-direction:column;gap:8px;padding-top:4px;}
.cmt-item{display:flex;align-items:baseline;gap:9px;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line);}
.cmt-item:last-child{border-bottom:none;}
.cmt-author{font-weight:600;display:inline-flex;align-items:center;gap:5px;flex-shrink:0;}
.cmt-rolebadge{font-size:10px;font-weight:700;border-radius:10px;padding:1px 5px;}
.cmt-text{flex:1;color:#3a4050;}
.cmt-time{font-size:11px;color:var(--muted);flex-shrink:0;}
.cmt-form{display:flex;gap:8px;margin-top:6px;}
.notice-list{display:flex;flex-direction:column;}
.notice-item{padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer;}
.notice-item:last-child{border-bottom:none;}
.notice-main{display:flex;align-items:center;gap:10px;}
.notice-title{font-size:13.5px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.notice-date{font-size:11.5px;color:var(--muted);flex-shrink:0;}
.notice-body{margin-top:9px;padding:12px 14px;background:rgba(255,255,255,.6);border-radius:10px;font-size:13px;line-height:1.6;color:#3a4254;white-space:pre-wrap;}
.notice-actions{display:flex;gap:6px;margin-top:10px;}
.chk-line{display:flex;align-items:center;gap:7px;font-size:13px;margin-bottom:12px;cursor:pointer;}
.chk-line input{width:auto;}
textarea:not(.docf-remark-inp):not(.docf-rinp){font-family:inherit;font-size:14px;padding:11px 13px;border-radius:10px;border:1px solid #e4e6ef;background:#fff;color:var(--ink);width:100%;resize:vertical;transition:border-color .15s,box-shadow .15s;}
textarea:focus{outline:none;border-color:var(--lilac);box-shadow:0 0 0 4px rgba(91,141,239,.12);}
.cal-cell.today{border-color:#15181d;box-shadow:0 0 0 2px rgba(21,24,29,.12);}
.cal-cell.today .cal-day{background:#15181d;color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;}
.cal-cell.nonwork{background:#fafbfc;}
.cal-cell.editable{cursor:pointer;}
.cal-cell.editable:hover{background:#f7f8fa;border-color:#dfe3ea;transform:translateY(-1px);box-shadow:0 4px 12px rgba(21,24,29,.06);}
.cal-day-row{display:flex;align-items:center;justify-content:space-between;}
.cal-add{color:#c4c8d4;}
.cal-cell.editable:hover .cal-add{color:#15181d;}
.cal-day{font-size:12px;font-weight:700;color:#3a4250;}
.cal-day.sun{color:#b0556f;}
.cal-day.sat{color:#5a7099;}
.cal-chips{display:flex;flex-direction:column;gap:3px;overflow:hidden;flex:1;min-height:0;}
.cal-chip{font-size:10px;font-weight:500;padding:2px 6px;border-radius:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.cal-more{font-size:9px;color:var(--muted);padding:0 3px;}
.cal-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
.cal-leg{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);}
.cal-leg-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.leg-item{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);}
.leg-dot{width:8px;height:8px;border-radius:10px;}
.cal-hint{font-size:11.5px;color:var(--muted);margin-top:10px;}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(20,22,30,.45);display:flex;align-items:center;justify-content:center;z-index:300;padding:20px;}
.modal{background:#fff;border-radius:16px;padding:22px 24px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(26,34,51,.22);max-height:calc(100vh - 40px);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;font-size:15px;}
.modal-events{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.ev-row{display:flex;align-items:center;gap:9px;font-size:13px;padding:7px 0;border-bottom:1px solid var(--line);}
.modal-form{display:flex;gap:8px;align-items:center;}
.modal-form select{width:auto;flex-shrink:0;}

/* apply + history split layout */
.apply-layout{display:grid;grid-template-columns:minmax(380px,440px) 1fr;gap:16px;align-items:start;}

/* attendance + overtime */
.attend-layout{display:grid;grid-template-columns:minmax(360px,420px) 1fr;gap:16px;align-items:start;}
.quick-punch{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;}
.punch2-head{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:#2a3340;margin-bottom:14px;}
.punch2-head svg{color:#7d8aa0;}
.punch2-date{margin-left:auto;font-size:12px;font-weight:500;color:var(--muted);}
.punch2-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.punch2-slot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-radius:14px;background:#f5f6f8;border:1px solid var(--line);transition:all .15s;}
.punch2-slot.done{background:#eaf2fe;border-color:#dbe9fd;}
.punch2-slot-info{display:flex;flex-direction:column;gap:2px;min-width:0;}
.punch2-k{font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;}
.punch2-rec{font-size:10px;font-weight:600;color:#7d8aa0;background:#eef0f3;padding:1px 6px;border-radius:6px;}
.punch2-v{font-size:24px;font-weight:800;letter-spacing:-.02em;color:#15181d;font-variant-numeric:tabular-nums;}
.punch2-slot.done .punch2-v{color:#1d6ff2;}
.punch2-btn{flex-shrink:0;padding:9px 14px;font-size:13px;}
.punch2-slot.done .punch2-btn{background:#fff;color:#1d6ff2;border-color:#dbe9fd;box-shadow:none;cursor:default;}
.punch2-msg{margin-top:12px;font-size:13px;font-weight:600;text-align:center;}
@media(max-width:560px){.punch2-grid{grid-template-columns:1fr;}}
.qp-info{flex:1;min-width:240px;}
.qp-title{display:flex;align-items:center;gap:7px;font-size:15px;font-weight:600;margin-bottom:10px;}
.qp-times{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.qp-pair{display:flex;align-items:center;gap:8px;}
.qp-k{font-size:12px;color:var(--muted);font-weight:600;}
.qp-v{font-size:24px;font-weight:700;letter-spacing:-.02em;color:#c4c8d4;font-variant-numeric:tabular-nums;}
.qp-v.on{color:var(--ink);}
.qp-sep{width:1px;height:24px;background:var(--line);}
.qp-rec{font-size:12px;color:var(--lilac);background:var(--lilac-t);padding:4px 10px;border-radius:10px;font-weight:600;}
.qp-msg{font-size:12.5px;margin-top:8px;font-weight:500;}
.qp-actions{display:flex;gap:8px;}
.qp-actions .btn{min-width:96px;}
.att-today{display:flex;gap:28px;flex-wrap:wrap;padding:6px 0 4px;}
.att-pair{display:flex;align-items:center;gap:9px;}
.att-k{font-size:12px;color:var(--muted);font-weight:600;}
.att-v{font-size:26px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.att-v.ok{color:var(--ink);}
.att-v.warn{color:#D9971A;}
.att-v.none{color:#c4c8d4;}
.att-rec{font-size:12px;color:var(--muted);}
.att-manual{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:340px;}
/* 주간 근태 현황 */
.week-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.week-nav{display:flex;align-items:center;gap:8px;}
.week-range{font-size:17px;font-weight:700;letter-spacing:-.01em;min-width:230px;text-align:center;}
.week-grouplabel{font-size:12.5px;color:var(--muted);font-weight:500;}
.week-summary{display:flex;align-items:center;gap:24px;margin-bottom:18px;flex-wrap:wrap;}
.ws-left{flex:1;min-width:240px;}
.ws-acc-label{font-size:12.5px;color:var(--muted);font-weight:600;}
.ws-acc-value{font-size:26px;font-weight:800;letter-spacing:-.02em;color:#15181d;margin:2px 0;}
.ws-acc-sub{font-size:12px;color:var(--muted);margin-bottom:12px;}
.ws-bar{position:relative;height:8px;border-radius:10px;background:#eef0f6;overflow:visible;}
.ws-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#3a4250,#5a6675);}
.ws-bar-target{position:absolute;right:0;top:-2px;font-size:10px;color:var(--muted);}
.ws-divider{width:1px;align-self:stretch;background:var(--line);}
.ws-metrics{display:flex;gap:28px;flex-wrap:wrap;}
.wsm-k{font-size:12px;color:var(--muted);margin-bottom:4px;}
.wsm-v{font-size:20px;font-weight:700;letter-spacing:-.01em;}
.wsm-of{font-size:12px;color:var(--muted);font-weight:500;margin-left:2px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.week-grid.month{gap:5px;}
.week-grid.month .day-card{min-height:96px;padding:7px;}
.day-card.empty{border:none;background:transparent;min-height:0;}
.day-card{border:1px solid var(--line);border-radius:10px;padding:10px;min-height:120px;background:#fff;display:flex;flex-direction:column;}
.day-card.today{border-color:var(--lilac);box-shadow:0 0 0 3px rgba(91,141,239,.1);}
.day-card.weekend{background:#fafbfd;}
.day-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.day-dow{font-size:12px;font-weight:600;color:var(--muted);}
.day-dow.sat{color:var(--blue,#5a7099);}
.day-dow.sun{color:var(--rose,#b0556f);}
.day-num{font-size:13px;font-weight:700;}
.day-body{display:flex;flex-direction:column;gap:5px;}
.day-net{font-size:13px;font-weight:700;color:#475467;background:#EEF1F5;border-radius:10px;padding:3px 8px;display:inline-block;width:fit-content;}
.day-io{display:flex;flex-direction:column;gap:2px;font-size:11px;}
.dio-in{color:#1d6ff2;display:inline-flex;align-items:center;gap:2px;}
.dio-out{color:#5a6675;display:inline-flex;align-items:center;gap:2px;}
.day-card.clickable{cursor:pointer;transition:box-shadow .14s,transform .1s,border-color .14s;}
.day-card.clickable:hover{box-shadow:0 4px 16px rgba(16,24,40,.1);border-color:#c8ccda;transform:translateY(-1px);}
.day-chip{font-size:10.5px;font-weight:600;border-radius:10px;padding:2px 7px;width:fit-content;}
.day-ot{font-size:10.5px;font-weight:600;color:var(--blue,#5a7099);background:#E7F0FE;border-radius:10px;padding:2px 7px;width:fit-content;}
.day-card.missing{border-color:#6DD3D0;background:#F2FBFB;}
.day-wr-btn{font-size:10.5px;font-weight:600;color:#fff;background:#3a4250;border:none;border-radius:10px;padding:4px 8px;cursor:pointer;width:100%;font-family:inherit;margin-top:2px;}
.day-wr-btn:hover{filter:brightness(1.05);}
.day-wr{display:flex;flex-direction:column;gap:3px;font-size:10px;color:var(--muted);align-items:flex-start;}
.day-rest{font-size:11.5px;color:#9aa1ad;}
.day-none{font-size:13px;color:#d0d4de;}
.att-quick{display:flex;gap:8px;margin-left:auto;}
.att-legend{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;}
.ot-calc{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#ffffff;border:1px solid var(--line);border-radius:10px;padding:13px 15px;}
/* 업무일지 */
.wl-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.wl-sub{font-size:12.5px;color:var(--muted);margin-top:3px;}
.wl-week{display:flex;align-items:center;gap:6px;}
.wl-week-lbl{font-size:13.5px;font-weight:600;min-width:148px;text-align:center;}
.wl-stat-row{display:flex;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap;}
.wl-stat{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:10px;background:#ffffff;}
.wl-stat::before{content:"";width:7px;height:7px;border-radius:10px;background:#94a0b8;flex-shrink:0;}
.wl-stat span{font-size:12px;color:var(--muted);font-weight:500;}
.wl-stat strong{font-size:14px;color:var(--ink);font-weight:700;}
.wl-stat.ot::before{background:#7a8595;}
.wl-stat.total{background:var(--lilac-t);}
.wl-stat.total::before{background:var(--lilac);}
.wl-stat.total strong{color:var(--lilac);}
.wl-stat-badge{margin-left:auto;}
.wl-empty{display:flex;flex-direction:column;align-items:center;gap:10px;padding:34px 16px;color:#9aa1ad;text-align:center;}
.wl-empty p{font-size:13px;line-height:1.6;margin:0;}
.wl-rows{display:flex;flex-direction:column;gap:12px;}
.wl-row{display:flex;gap:12px;align-items:flex-start;padding:13px;border:1px solid var(--line);border-radius:10px;background:#ffffff;box-shadow:0 2px 8px rgba(50,48,60,.04);}
.wl-row-main{flex:1;display:flex;flex-direction:column;gap:9px;min-width:0;}
.wl-row-top{display:flex;gap:8px;align-items:center;}
.wl-date{width:128px;flex-shrink:0;font-family:inherit;}
.wl-task{width:100%;resize:vertical;font-family:inherit;}
.wl-row-side{display:flex;align-items:flex-end;gap:8px;flex-shrink:0;}
.wl-hours{display:flex;flex-direction:column;gap:3px;}
.wl-hours label{font-size:10.5px;color:var(--muted);font-weight:600;text-align:center;}
.wl-hours.ot label{color:#7a8595;}
.wl-hours input{width:58px;text-align:center;}
.wl-note-view{margin-top:12px;padding:11px 14px;background:rgba(255,255,255,.6);border-radius:10px;font-size:12.5px;color:#475467;}
.wl-note-view strong{color:var(--ink);margin-right:6px;}
.wlc-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px;}
.wlc-dow{text-align:center;font-size:11.5px;font-weight:600;color:var(--muted);}
.wlc-dow.sun{color:#b0556f;}.wlc-dow.sat{color:#5a7099;}
.wlc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.wlc-cell{aspect-ratio:1;border:1px solid var(--line);border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:3px;background:#fff;min-height:62px;font-family:inherit;text-align:left;align-items:stretch;}
.wlc-cell.has{cursor:pointer;transition:box-shadow .12s,transform .1s;}
.wlc-cell.has:hover{box-shadow:0 4px 14px rgba(16,24,40,.1);transform:translateY(-1px);border-color:#c8ccda;}
.wlc-cell:disabled{cursor:default;}
.wlc-mini{display:flex;height:4px;border-radius:10px;overflow:hidden;background:#f0f1f5;margin-top:2px;}
.wlc-mini-reg{background:var(--lilac);}
.wlc-mini-ot{background:#7a8595;}
.wlc-legend{display:flex;gap:16px;margin-top:11px;font-size:11.5px;color:var(--muted);}
.wlc-legend span{display:inline-flex;align-items:center;gap:5px;}
.wlc-lg{width:9px;height:9px;border-radius:10px;}
.wl-day-list{display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto;}
.wl-day-item{padding:12px;border:1px solid var(--line);border-radius:10px;background:#ffffff;}
.wl-day-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.wl-day-pname{font-size:13px;font-weight:600;color:var(--ink);}
.wl-day-task{font-size:12.5px;color:#475467;line-height:1.5;margin-bottom:7px;white-space:pre-wrap;}
.wl-day-hrs{display:flex;gap:6px;}
.wl-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;}
.wl-tag.reg{background:var(--lilac-t);color:var(--lilac);}
.wl-tag.ot{background:#FFEDE3;color:#7a8595;}
.wlc-cell.empty{border:none;background:transparent;}
.wlc-cell.today{border-color:var(--lilac);box-shadow:inset 0 0 0 1px var(--lilac);}

.psearch-btn:hover{border-color:#c8ccda;}

.psearch-inp{display:flex;align-items:center;gap:7px;padding:10px 13px;border-bottom:1px solid var(--line);color:var(--muted);}

.psearch-list{max-height:240px;overflow-y:auto;}
.psearch-opt{display:flex;align-items:center;gap:8px;width:100%;padding:10px 13px;border:none;border-bottom:1px solid #f0f1f5;background:#fff;cursor:pointer;font-family:inherit;text-align:left;}

.psearch-nm{flex:1;font-size:13px;font-weight:500;color:var(--ink);min-width:0;}
.psearch-cl{font-size:11px;color:var(--muted);flex-shrink:0;}
.date-hol{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12.5px;font-weight:600;}

.dpop{position:relative;}
.dpop-input{display:flex;align-items:center;justify-content:space-between;width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;font-family:inherit;font-size:14px;color:var(--ink);cursor:pointer;transition:border-color .14s;}
.dpop-input:hover{border-color:#c8ccda;}
.dpop-ic{color:var(--muted);flex-shrink:0;}
.dpop-backdrop{position:fixed;inset:0;z-index:30;}

.dpop-panel.align-right{left:auto;right:0;}

.dpop-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.dpop-title{font-size:15px;font-weight:700;color:#fff;}

.dpop-hol-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#7a8595;}

.dpop-hol-list{margin-top:9px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:4px;}

/* ── 1400px+: 넓은 데스크탑 ── */
@media(min-width:1400px){
  .content{padding:10px clamp(32px,4vw,60px) 48px;}
  .card{border-radius:28px;padding:28px 32px;}
  .stat-card{padding:20px 22px;gap:16px;}
  .stat-ic{width:48px;height:48px;border-radius:14px;}
  .stat-label{font-size:13px;}
  .stat-value{font-size:26px;}
  .card-head h3{font-size:18px;}
  .page-title{font-size:32px;}
  .hero-grid{gap:14px;}
}
/* ── 1200px: 중간 데스크탑 ── */
@media(max-width:1200px){
  .hero-grid{gap:10px;}
  .dash-grid{gap:12px;}
  .stat-ic{width:38px;height:38px;}
  .stat-value{font-size:20px;}
}
/* ── 980px: 작은 데스크탑/태블릿 가로 ── */
@media(max-width:980px){
  .hero-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .dash-grid{grid-template-columns:1fr;}

/* ── 모바일 공통: 가로 스크롤 완전 차단 ── */
@media(max-width:760px){
  .layout,.main,.content{max-width:100vw;overflow-x:hidden;}
  .card,.hero-grid,.stat-card{max-width:100%;box-sizing:border-box;}
  /* ── 모바일: 테이블 컴팩트 + 가로스크롤 제거 ── */
  .tscroll table.dt,.dt-wrap table.dt{min-width:0!important;width:100%;table-layout:fixed;}
  table.dt th,table.dt td{font-size:11px;padding:6px 5px;white-space:normal;word-break:keep-all;overflow:hidden;text-overflow:ellipsis;}
  table.dt .btn,.ic-btn{white-space:nowrap;font-size:10px;padding:3px 6px;}
  .dt-wrap,.tscroll{overflow-x:hidden;}
  /* 처리/관리 버튼 셀: 줄바꿈 허용해 겹침 방지 */
  table.dt td .btn-xs{margin:0;}
  table.dt th:last-child,table.dt td:last-child{width:58px;}
  .row-actions{display:flex!important;flex-wrap:wrap;gap:3px;justify-content:flex-end;align-items:stretch;}
  .row-actions .btn{flex:0 0 auto;min-width:0;}
  /* 구분 칩(pill): 모바일 컴팩트 + 셀 안에서 말줄임 */
  table.dt td .pill{padding:2px 6px;font-size:10px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  table.dt td .stat{font-size:10px;}

  /* ════ 관리자(admin) 화면 ════ */
  /* 신청현황(pending): 사유(5) 숨김 */
  [data-role="admin"][data-tab="pending"] table.dt th:nth-child(5),
  [data-role="admin"][data-tab="pending"] table.dt td:nth-child(5){display:none;}
  /* 직원정보(info): 근속(4)·연락처(5) 숨김 */
  [data-role="admin"][data-tab="info"] table.dt th:nth-child(4),
  [data-role="admin"][data-tab="info"] table.dt td:nth-child(4),
  [data-role="admin"][data-tab="info"] table.dt th:nth-child(5),
  [data-role="admin"][data-tab="info"] table.dt td:nth-child(5){display:none;}
  /* 근태현황(attendance): 권장퇴근(6)·근로신청(7) 숨김 */
  [data-role="admin"][data-tab="attendance"] table.dt th:nth-child(6),
  [data-role="admin"][data-tab="attendance"] table.dt td:nth-child(6),
  [data-role="admin"][data-tab="attendance"] table.dt th:nth-child(7),
  [data-role="admin"][data-tab="attendance"] table.dt td:nth-child(7){display:none;}
  /* 업무일지(worklog): 정규(4)·특근(5) 압축 */
  [data-role="admin"][data-tab="worklog"] table.dt th:nth-child(4),
  [data-role="admin"][data-tab="worklog"] table.dt td:nth-child(4),
  [data-role="admin"][data-tab="worklog"] table.dt th:nth-child(5),
  [data-role="admin"][data-tab="worklog"] table.dt td:nth-child(5){width:38px;}
  /* 휴가현황(leaves): 방식(3)·사유(6) 숨김 */
  [data-role="admin"][data-tab="leaves"] table.dt th:nth-child(3),
  [data-role="admin"][data-tab="leaves"] table.dt td:nth-child(3),
  [data-role="admin"][data-tab="leaves"] table.dt th:nth-child(6),
  [data-role="admin"][data-tab="leaves"] table.dt td:nth-child(6){display:none;}
  /* 시간외근로(extra): 사유(6) 숨김 */
  [data-role="admin"][data-tab="extra"] table.dt th:nth-child(6),
  [data-role="admin"][data-tab="extra"] table.dt td:nth-child(6){display:none;}
  /* 경비정산(expense): 카드(4)·거래처(5)·상품명(6)·프로젝트(7) 숨김, 처리칸 확보 */
  [data-role="admin"][data-tab="expense"] table.dt th:nth-child(4),
  [data-role="admin"][data-tab="expense"] table.dt td:nth-child(4),
  [data-role="admin"][data-tab="expense"] table.dt th:nth-child(5),
  [data-role="admin"][data-tab="expense"] table.dt td:nth-child(5),
  [data-role="admin"][data-tab="expense"] table.dt th:nth-child(6),
  [data-role="admin"][data-tab="expense"] table.dt td:nth-child(6),
  [data-role="admin"][data-tab="expense"] table.dt th:nth-child(7),
  [data-role="admin"][data-tab="expense"] table.dt td:nth-child(7){display:none;}
  [data-role="admin"][data-tab="expense"] table.dt td:last-child{overflow:visible;}
  [data-role="admin"][data-tab="expense"] table.dt td:last-child > div{flex-wrap:wrap;gap:3px;}
  /* 문서결재(docs): 제출일(3) 숨김 */
  [data-role="admin"][data-tab="docs"] table.dt th:nth-child(3),
  [data-role="admin"][data-tab="docs"] table.dt td:nth-child(3){display:none;}

  /* ════ 직원/결재자(emp) 화면 ════ */
  /* 결재자 신청현황(approvals): 사유(5) 숨김 */
  [data-role="emp"][data-tab="approvals"] table.dt th:nth-child(5),
  [data-role="emp"][data-tab="approvals"] table.dt td:nth-child(5){display:none;}
  /* 시간외근로(extra): 사유(5) 숨김 */
  [data-role="emp"][data-tab="extra"] table.dt th:nth-child(5),
  [data-role="emp"][data-tab="extra"] table.dt td:nth-child(5){display:none;}
  /* 휴가(apply): 방식(2)·사유(5) 숨김 */
  [data-role="emp"][data-tab="apply"] table.dt th:nth-child(2),
  [data-role="emp"][data-tab="apply"] table.dt td:nth-child(2),
  [data-role="emp"][data-tab="apply"] table.dt th:nth-child(5),
  [data-role="emp"][data-tab="apply"] table.dt td:nth-child(5){display:none;}
  /* 경비정산(expense): 카드(3)·거래처(4)·상품명(5) 숨김 */
  [data-role="emp"][data-tab="expense"] table.dt th:nth-child(3),
  [data-role="emp"][data-tab="expense"] table.dt td:nth-child(3),
  [data-role="emp"][data-tab="expense"] table.dt th:nth-child(4),
  [data-role="emp"][data-tab="expense"] table.dt td:nth-child(4),
  [data-role="emp"][data-tab="expense"] table.dt th:nth-child(5),
  [data-role="emp"][data-tab="expense"] table.dt td:nth-child(5){display:none;}
  /* 문서함(docs): 제출일(2) 숨김 */
  [data-role="emp"][data-tab="docs"] table.dt th:nth-child(2),
  [data-role="emp"][data-tab="docs"] table.dt td:nth-child(2){display:none;}
  /* 달력 주간 가로 스크롤 방지 */
  .week-grid{grid-template-columns:repeat(7,1fr);overflow-x:hidden;}
  .cal-cell{min-height:auto;height:clamp(46px,12vw,68px);}
  /* 날짜 팝업 폭 제한 */
  .dpop-panel{width:min(300px,calc(100vw - 40px))!important;left:0!important;right:auto!important;}
  /* 모달 */
  .modal{width:calc(100vw - 24px)!important;max-width:100%!important;margin:0 12px;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal{border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto;}
  /* 폼 그리드 */
  .g2,.g3{grid-template-columns:1fr!important;}
  /* 카드 헤더 wrap */
  .card-head{flex-wrap:wrap;gap:8px;}
  /* 출퇴근 펀치 / 시간외 계산 등 과대 숫자 축소 */
  .punch2-v{font-size:19px;}
  .punch2-slot{padding:11px 13px;border-radius:12px;}
  .punch2-grid{gap:9px;}
  .punch2-btn{padding:8px 12px;font-size:12.5px;}
  .otc-v{font-size:14px;}
  .otc-tag{font-size:9.5px;}
  /* 모달 내부 여백/폰트 */
  .modal{padding:18px 18px;}
  .modal-head{font-size:14px;}
  .if-title{font-size:13.5px;}
  .quick-punch{gap:12px;}
  /* 큰 통계/숫자 값 */
  .stat-value{font-size:clamp(14px,4vw,16px);}
}

.docf-addbar{display:flex;justify-content:flex-end;margin-top:10px;}
.docf-additem2{display:inline-flex;align-items:center;gap:5px;background:#fff;color:#1d6ff2;border:1px dashed #9cc0f7;border-radius:9px;padding:7px 16px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;}
.docf-additem2:hover{background:#eaf2fe;border-color:#1d6ff2;}
@media(max-width:860px){
  .docf-wrap{overflow-x:auto;}
  .docf{min-width:560px;}
  .docf-title{font-size:20px;letter-spacing:5px;}
  .docf-logo{height:28px;width:auto;}
  .docf th,.docf td{font-size:12px;padding:5px 6px;}
  .docf-inp{font-size:12px;}
  .docf-inp.docf-date{min-width:80px;font-size:11.5px;}
}
@media(max-width:600px){
  /* 문서 양식: 화면 폭에 맞춰 전체 축소 → 가로 스크롤 없이 한눈에 (PC 레이아웃 비율 유지) */
  .docf-wrap{overflow-x:hidden;}
  .docf{min-width:0;}
  .docf-top{min-width:0;}
  .docf-brand{padding:10px 6px 12px;}
  .docf-title{font-size:21px;letter-spacing:5px;}
  .docf-logo{height:27px;width:auto;}
  .docf th,.docf td{font-size:11.5px;padding:5px 4px;}
  .docf-inp{font-size:11.5px;padding:4px 2px;}
  .docf-inp.docf-date{min-width:0;width:100%;font-size:11.5px;}
  .docf-sign th,.docf-sign td{font-size:11px;padding:5px 3px;}
  .docf-sign .dsc-side,.docf-sign .ds-side{width:22px;}
  .docf-sec{letter-spacing:3px;}
  .docf-sum th{letter-spacing:2px;}
  .docf-sum .num{padding-right:6px;}
  .docf-remark{padding:8px 9px;}
  .docf-rlb{font-size:11px;}
}
@media(max-width:400px){
  .docf-title{font-size:18px;letter-spacing:3px;}
  .docf th,.docf td{font-size:10px;padding:4px 3px;}
  .docf-inp{font-size:10px;}
  .docf-inp.docf-date{font-size:10px;}
  .docf-sign th,.docf-sign td{font-size:9.5px;padding:4px 2px;}
  .docf-sign .dsc-side,.docf-sign .ds-side{width:18px;}
}

/* ───── 조직도 (Org Chart) — 시스템 통일 / 미니멀 ───── */
.org-page{padding:2px 0 34px;}
.org-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
.org-bar-right{display:flex;align-items:center;gap:12px;}
.org-hint{font-size:12px;color:var(--muted);font-weight:500;}
.org-empty-m{color:#c5ccd8;font-size:12px;padding-left:2px;font-weight:500;}
.org-title{font-size:19px;font-weight:700;color:var(--ink);letter-spacing:-.01em;margin:0;}
.org-title-ei{font-size:19px;font-weight:700;max-width:320px;}
.org-editbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:11px;border:1px solid var(--line);background:#fff;color:#475467;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;box-shadow:0 2px 8px rgba(26,34,51,.04);}
.org-editbtn:hover{border-color:var(--accent);color:var(--accent);}
.org-editbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 6px 16px rgba(29,111,242,.28);}
.org-canvas{display:flex;flex-direction:column;align-items:center;width:100%;overflow-x:auto;padding:10px 4px 6px;}
.org-rootwrap{display:flex;justify-content:center;}
.org-node{position:relative;background:#fff;}
/* 루트 SPS — navy 솔리드 칩 */
.org-root{background:#1a2233;color:#fff;padding:13px 36px;border-radius:14px;display:flex;align-items:baseline;gap:8px;box-shadow:0 6px 20px rgba(26,34,51,.20);}
.org-rootname{font-size:16px;font-weight:700;letter-spacing:.04em;}
.org-root .org-cnt,.org-root .org-cnt-edit{color:#aeb7c9;font-size:13.5px;font-weight:600;}
/* 총괄책임 — accent 솔리드 칩 */
.org-lead{background:#1d6ff2;color:#fff;padding:12px 30px;text-align:center;border-radius:14px;box-shadow:0 6px 18px rgba(29,111,242,.28);}
.org-lead-top{font-size:15px;font-weight:700;display:flex;align-items:baseline;justify-content:center;gap:6px;}
.org-lead-top .org-cnt,.org-lead-top .org-cnt-edit{color:#cfe0ff;font-size:12.5px;font-weight:600;}
.org-lead-person{font-size:12px;color:#d7e5ff;margin-top:2px;font-weight:500;}
/* 커넥터 — 얇고 연하게 */
.org-conn-v{width:1.5px;background:#dde3ee;}
.org-conn-v{height:24px;}
.org-conn-v.sm{height:15px;}
.org-divs-rail{position:relative;display:flex;flex-direction:column;align-items:center;width:100%;}
.org-busbar{position:absolute;top:0;height:1.5px;background:#dde3ee;left:13%;right:13%;border-radius:2px;}
.org-divs{display:flex;gap:24px;justify-content:center;align-items:flex-start;flex-wrap:nowrap;}
/* 부서 컬럼 — accent별 CSS변수 --dac */
.org-divcol{display:flex;flex-direction:column;align-items:center;min-width:214px;max-width:262px;flex:1 1 0;}
.org-divcol.acc-blue{--dac:#1d6ff2;--dact:#eaf2fe;}
.org-divcol.acc-indigo{--dac:#5b63d3;--dact:#edeefc;}
.org-divcol.acc-teal{--dac:#1d9b8e;--dact:#e5f6f3;}
.org-divcol.acc-slate{--dac:#5d6880;--dact:#eef0f3;}
/* 부서 헤더 — 화이트 카드 + 상단 컬러 바 */
.org-div{width:100%;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 16px 13px;text-align:center;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(26,34,51,.04),0 7px 18px rgba(29,111,242,.05);}
.org-div::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--dac);}
.org-div-top{font-size:14.5px;font-weight:700;color:var(--ink);display:flex;align-items:baseline;justify-content:center;gap:5px;}
.org-div-top .org-cnt{color:var(--dac);font-size:12.5px;font-weight:700;}
.org-div-top .org-cnt-edit{color:var(--dac);font-size:12.5px;font-weight:700;}
.org-div-head{font-size:11.5px;margin-top:4px;color:var(--muted);font-weight:500;}
.org-deldiv{position:absolute;top:8px;right:8px;width:22px;height:22px;border:none;border-radius:7px;background:var(--dact);color:var(--dac);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
.org-deldiv:hover{background:#ffe3e8;color:#d6446a;}
/* 스튜디오 박스 — 화이트 카드 */
.org-studiobox{width:100%;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 14px 13px;display:flex;flex-direction:column;gap:13px;box-shadow:0 1px 3px rgba(26,34,51,.04),0 7px 18px rgba(29,111,242,.04);}
.org-studio{display:flex;flex-direction:column;gap:6px;}
.org-studio-hd{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--ink);}
.org-dot{width:7px;height:7px;border-radius:50%;background:var(--dac);flex-shrink:0;}
.org-members{display:flex;flex-direction:column;gap:4px;padding-left:15px;}
.org-member{display:flex;align-items:center;gap:7px;font-size:12.5px;}
.org-mdot{width:4px;height:4px;border-radius:50%;background:var(--dac);opacity:.45;flex-shrink:0;}
.org-mname{font-weight:600;color:var(--ink);}
.org-mrank{color:var(--muted);font-weight:500;font-size:11.5px;margin-left:3px;}
/* 편집 인라인 input */
.org-ei{border:1px solid var(--line)!important;background:#fff;border-radius:8px;padding:4px 8px;font-family:inherit;font-size:13px;color:var(--ink);width:auto;transition:border-color .14s,box-shadow .14s;}
.org-ei:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(29,111,242,.12);}
.org-ei-c{text-align:center;background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.4)!important;color:#fff;font-weight:700;max-width:130px;}
.org-ei-c::placeholder{color:rgba(255,255,255,.6);}
.org-div .org-ei-c{background:#fff!important;border:1px solid var(--line)!important;color:var(--ink);}
.org-ei-num{width:46px!important;text-align:center;padding:3px 4px;}
.org-ei-c+.org-cnt-edit .org-ei-num,.org-root .org-ei-num,.org-lead .org-ei-num{background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.4)!important;color:#fff;}
.org-div .org-ei-num{background:#fff!important;border:1px solid var(--line)!important;color:var(--ink);}
.org-cnt-edit{display:inline-flex;align-items:center;gap:1px;}
.org-lead-person .org-ei-c{background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.4)!important;color:#fff;}
.org-ei-s{max-width:122px;font-weight:700;padding:3px 8px;}
.org-ei-m{max-width:80px;padding:3px 7px;font-size:12px;}
.org-ei-r{max-width:56px;padding:3px 7px;font-size:12px;}
.org-delstudio,.org-delm{border:none;background:transparent;color:#b9a0ac;cursor:pointer;display:inline-flex;align-items:center;padding:2px;border-radius:5px;flex-shrink:0;}
.org-delstudio:hover,.org-delm:hover{background:#ffe3e8;color:#d6446a;}
.org-addm,.org-addstudio,.org-adddiv{display:inline-flex;align-items:center;gap:4px;border:1px dashed #c2d4f5;background:#fff;color:var(--accent);border-radius:9px;padding:6px 12px;font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;margin-top:3px;align-self:flex-start;transition:all .14s;}
.org-addm:hover,.org-addstudio:hover,.org-adddiv:hover{background:var(--lilac-t);border-color:var(--accent);}
.org-adddiv-wrap{display:flex;align-items:flex-start;padding-top:34px;}
.org-adddiv{padding:10px 17px;font-size:13px;border-radius:11px;}
@media(max-width:760px){
  /* 모바일: 실(부서)을 가로 배치 대신 세로 카드 스택으로 → 한눈에 깔끔하게 */
  .org-canvas{overflow-x:hidden;padding:8px 0 6px;}
  .org-divs{flex-direction:column;flex-wrap:nowrap;gap:14px;align-items:stretch;}
  .org-busbar{display:none;}
  .org-divcol{min-width:0;max-width:none;width:100%;flex:none;}
  .org-divcol>.org-conn-v.sm:first-child{display:none;}
  .org-divcol>.org-conn-v.sm{height:10px;}
  .org-div{border-color:#dfe4ee;}
  .org-studiobox{border-color:#dfe4ee;}
}
`;

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(SPSLeaveSystem));
